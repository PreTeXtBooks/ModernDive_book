name: Test PreTeXt Book Build

on:
  # Run on pull requests targeting v2 to verify the book builds
  pull_request:
    branches:
      - v2

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PreTeXt CLI
        run: |
          pip install -r pretext/requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install R dependencies for figure generation
        run: |
          Rscript --no-init-file -e '
            pkgs <- c("ggplot2", "dplyr", "tibble", "tidyr", "readr",
                      "patchwork", "scales", "gapminder",
                      "nycflights23", "moderndive",
                      "infer", "gridExtra", "GGally", "fivethirtyeight", "mvtnorm",
                      "ISLR2", "ggrepel")
            missing <- pkgs[!pkgs %in% rownames(installed.packages())]
            if (length(missing) > 0) {
              install.packages(missing, quiet = TRUE,
                repos = Sys.getenv("RSPM",
                  "https://packagemanager.posit.co/cran/__linux__/noble/latest"))
            }
          '

      - name: Generate R figures for PreTeXt book
        run: |
          IMAGES_DIR="$(pwd)/images" Rscript --no-init-file pretext/generate_images.R

      - name: Copy images for PreTeXt
        run: |
          python3 copy_images.py

      - name: Build PreTeXt book (HTML)
        run: |
          cd pretext
          pretext build web
          # Verify build succeeded by checking if output exists
          if [ ! -d "output/web" ]; then
            echo "Build failed: output/web directory not created"
            exit 1
          fi
          echo "Build succeeded: output/web directory exists"
